name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-macos
            artifact: mc-aarch64-macos
          - os: macos-13
            target: x86_64-macos
            artifact: mc-x86_64-macos
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: mc-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: mc-aarch64-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Run tests
        if: "!contains(matrix.target, 'aarch64-linux')"
        run: zig build test

      - name: Package
        run: |
          cd zig-out/bin
          tar czf ../../${{ matrix.artifact }}.tar.gz mc
          cd ../..
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.sha256

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: mc-zig
          homebrew-tap: Dumbris/homebrew-tap
          download-url: https://github.com/Dumbris/mc-zig/releases/download/${{ github.ref_name }}/mc-aarch64-macos.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
